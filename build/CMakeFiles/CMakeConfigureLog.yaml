        implicitNoexcept[-]   habilitar noexcept implícito en funciones requeridas
        threadSafeInit[-]     habilitar la inicialización estática local segura para subprocesos
        inline[-]             quitar datos o función sin referencia si es
                              COMDAT o solo tiene vinculación interna (desactivado de forma predeterminada)
        sizedDealloc[-]       habilitar la desasignación de tamaño global de C++14
                              functions (activado de forma predeterminada)
        throwingNew[-]        supone que se inicia el operador new en caso de error (desactivado de manera predeterminada)
        referenceBinding[-]   un elemento temporal no se enlazará a un elemento que no es const
                              lvalue reference (activado de forma predeterminada en C++20 o posterior, implícito por /permissive-)
        twoPhase-             deshabilitar la búsqueda de nombres en dos fases
        ternary[-]            exigir reglas de C++11 al operador condicional
                              (activado de forma predeterminada en C++20 o posterior, implícito por /permissive-)
        noexceptTypes[-]      exigir reglas noexcept de C++17 (activadas de forma predeterminada en C++17 o versiones posteriores)
        alignedNew[-]         habilitar la alineación con C++17 de objetos asignados dinámicamente (activada de forma predeterminada)
        hiddenFriend[-]       exigir reglas de confianza ocultas de C++ estándar
                              (activado de forma predeterminada en C++20 o posterior, implícito por /permissive-)
        externC[-]            exigir reglas de Standard C++ para funciones "extern 'C'"
                              (activado de forma predeterminada en C++20 o posterior, implícito por /permissive-)
        lambda[-]             Compatibilidad con lambda mejorada con el uso del nuevo procesador de lambda
                              (activado de forma predeterminada en C++20 o posterior, implícito por /permissive-)
        tlsGuards[-]          generar comprobaciones en tiempo de ejecución para la inicialización de variables TLS (activado de forma predeterminada)
        zeroSizeArrayNew[-]   llama al miembro new o delete para las matrices de tamaño 0 de los objetos (activado de forma predeterminada)
        static_assert[-] control estricto de 'static_assert' (activado de forma predeterminada en C++20 o posterior,
                              implícito por /permissive-)
        gotoScope[-]          no puede saltar más allá de la inicialización de una variable (implícita por /permissive-)
        templateScope[-]      aplicar las reglas de sombra de los parámetros de las plantillas de C++ Estándar
        enumTypes[-]          habilitar tipos de enumeración subyacentes de C++ estándar (desactivado de forma predeterminada)
        enumEncoding[-]       codificar correctamente el uso de una enumeración como una plantilla que no es de tipo
                              argumento (desactivado de forma predeterminada)
        checkGwOdr[-]         exigir infracciones de reglas de una definición de C++ estándar
                              cuando se ha habilitado /Gw (desactivado de forma predeterminada)
        nrvo[-]               habilitar la elisión de movimiento y copia opcional (activada de forma predeterminada en C++20 o posterior,
                              implícito por /permissive- o /O2)
        __STDC__              definir __STDC__ a 1 en C
        __cplusplus[-]        la macro __cplusplus informa del estándar de C++ admitido (desactivado de forma predeterminada)
        char8_t[-]            habilitar la compatibilidad con literales 'u8' nativos de C++20 como 'const char8_t'
                              (activado de forma predeterminada en C++20 o posterior)
        externConstexpr[-]    habilitar la vinculación externa para variables constexpr en C++
